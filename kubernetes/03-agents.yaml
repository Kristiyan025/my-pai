# Kubernetes deployments for backend agents
# Apply after 02-services.yaml

# ============== Workspace Agent ==============
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workspace-agent
  namespace: my-pai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workspace-agent
  template:
    metadata:
      labels:
        app: workspace-agent
    spec:
      containers:
        - name: workspace-agent
          image: my-pai/workspace-agent:latest
          ports:
            - containerPort: 8010
          envFrom:
            - configMapRef:
                name: pai-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"

---
apiVersion: v1
kind: Service
metadata:
  name: workspace-agent
  namespace: my-pai
spec:
  selector:
    app: workspace-agent
  ports:
    - port: 8010
      targetPort: 8010

