# ============== SDSA Agent (GPU) ==============
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sdsa-agent
  namespace: my-pai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sdsa-agent
  template:
    metadata:
      labels:
        app: sdsa-agent
    spec:
      containers:
        - name: sdsa-agent
          image: my-pai/sdsa-agent:latest
          ports:
            - containerPort: 8012
          envFrom:
            - configMapRef:
                name: pai-config
          resources:
            requests:
              memory: "4Gi"
              cpu: "500m"
              nvidia.com/gpu: 1
            limits:
              memory: "8Gi"
              cpu: "2000m"
              nvidia.com/gpu: 1
          volumeMounts:
            - name: model-cache
              mountPath: /root/.cache
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache-pvc
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"

---
apiVersion: v1
kind: Service
metadata:
  name: sdsa-agent
  namespace: my-pai
spec:
  selector:
    app: sdsa-agent
  ports:
    - port: 8012
      targetPort: 8012

