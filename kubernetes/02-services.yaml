# Kubernetes deployments for backend services
# Apply after 01-infrastructure.yaml

# ============== FileSystem Service ==============
apiVersion: apps/v1
kind: Deployment
metadata:
  name: filesystem-service
  namespace: my-pai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: filesystem-service
  template:
    metadata:
      labels:
        app: filesystem-service
    spec:
      containers:
        - name: filesystem-service
          image: my-pai/filesystem-service:latest
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: pai-config
            - secretRef:
                name: pai-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"

---
apiVersion: v1
kind: Service
metadata:
  name: filesystem-service
  namespace: my-pai
spec:
  selector:
    app: filesystem-service
  ports:
    - port: 8001
      targetPort: 8001

